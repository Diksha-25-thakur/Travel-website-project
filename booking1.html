<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
        }

        /* Navbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h2 {
            color: #2c3e50;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        nav a:hover {
            color: #27ae60;
        }

        /* Title */
        .title {
            text-align: center;
            padding: 30px;
        }

        .title h1 {
            font-size: 35px;
            color: #2c3e50;
        }

        /* Form Section */
        .container {
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .booking-form {
            background: white;
            padding: 25px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .booking-form label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        .booking-form input,
        .booking-form select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .booking-form button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: none;
            background: #27ae60;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .booking-form button:hover {
            background: #219150;
        }

        /* Summary */
        .summary {
            margin-top: 15px;
            padding: 10px;
            background: #ecf0f1;
            border-radius: 5px;
            font-size: 14px;
        }

        /* Footer */
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <header>
    <a class="navbar-brand" href="#"><img src="../assest/images/logo.jpg" alt="Logo" width="70" /></a>
        <nav>
            <a href="home1.html">Home</a>
            <a href="destination1.html">Destination</a>
            <a href="offers1.html">Offers</a>
            <a href="booking1.html">Booking</a>
        </nav>
    </header>

    <!-- Title -->
    <div class="title">
        <h1>Book Your Trip</h1>
        <p>Fill the form to confirm your booking</p>
    </div>

    <!-- Booking Form -->
    <div class="container">
        <form class="booking-form" onsubmit="showSummary(event)">
            
            <label>Name</label>
            <input type="text" id="name" required>

            <label>Email</label>
            <input type="email" id="email" required>

            <label>Phone</label>
            <input type="tel" id="phone" required>

            <label>Destination</label>
            <select id="destination" required>
                <option value="">Select Destination</option>
                <option value="Goa">Goa</option>
                <option value="Manali">Manali</option>
                <option value="Jaipur">Jaipur</option>
                <option value="Kerala">Kerala</option>
            </select>

            <label>Travel Date</label>
            <input type="date" id="date" required>

            <label>Number of People</label>
            <input type="number" id="people" min="1" required>

            <button type="submit">Confirm Booking</button>

            <div class="summary" id="summary"></div>

        </form>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Traveling | All Rights Reserved</p>
    </footer>

    <script>
        function showSummary(event) {
            event.preventDefault();

            let name = document.getElementById("name").value;
            let destination = document.getElementById("destination").value;
            let date = document.getElementById("date").value;
            let people = document.getElementById("people").value;

            document.getElementById("summary").innerHTML =
                "<b>Booking Confirmed!</b><br>" +
                "Name: " + name + "<br>" +
                "Destination: " + destination + "<br>" +
                "Date: " + date + "<br>" +
                "People: " + people;
        }
    </script>

</body>
</html>
